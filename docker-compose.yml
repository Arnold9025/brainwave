services:
  postgres:
    image: postgres:16-alpine
    container_name: brainwave_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-brainwave}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-BrainWaveDb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
